After Gate D2 PASS:
- If repo-tracked changes are committable, run:
  1) /Users/crane/.agents/skills/commit/SKILL.md
  2) /Users/crane/.codex/superpowers/skills/finishing-a-development-branch/SKILL.md
- Otherwise return to Orchestrator / Reviewer for explicit non-committable completion handling.
- Do not insert other skills between those two skills on the committable path.
