model_provider = "qmcode"
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
personality = "pragmatic"

[model_providers.qmcode]
name = "qmcode"
base_url = "https://611996.xyz/v1"
wire_api = "responses"

[projects."/Users/crane"]
trust_level = "trusted"

[features]
multi_agent = true

[agents]
max_threads = 10
max_depth = 2

[agents.default]
description = "Gatekeeper + 调度者：把门禁变成硬规则，决定是否并行、何时从只读转入可写实现。"
config_file = "agents/default.toml"

[agents.worker]
description = "Execution-focused role for implementation and fixes."
config_file = "agents/worker.toml"

[agents.explorer]
description = "只读调查员：稳定复现、收证据、建立根因链路，并提交可审查的修复计划输入。"
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "审阅计划和任务完成情况，仅按验收清单+测试结果判定 PASS/FAIL。"
config_file = "agents/reviewer.toml"

[agents.monitor]
description = "Long-running command/task monitoring role optimized for waiting/polling."
config_file = "agents/monitor.toml"

[notice]
hide_full_access_warning = true

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[[skills.config]]
path = "/Users/crane/.codex/superpowers/skills/receiving-code-review/SKILL.md"
enabled = false
